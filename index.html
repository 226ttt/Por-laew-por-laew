<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Pneumatic Cylinder Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        /* Cylinder Visualization */
        .cylinder-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cylinder {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 120px;
            display: flex;
            align-items: center;
        }

        /* Cylinder Body */
        .cylinder-body {
            flex: 1;
            height: 80px;
            background: linear-gradient(180deg, #4a5568 0%, #2d3748 100%);
            border-radius: 10px;
            position: relative;
            border: 3px solid #718096;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        /* End Caps */
        .end-cap {
            width: 20px;
            height: 90px;
            background: linear-gradient(180deg, #5a6578 0%, #3d4758 100%);
            border: 3px solid #718096;
            border-radius: 5px;
            position: relative;
            z-index: 2;
        }

        .end-cap.left {
            margin-right: -3px;
        }

        .end-cap.right {
            margin-left: -3px;
        }

        /* Piston Rod */
        .piston-rod {
            height: 30px;
            background: linear-gradient(180deg, #a0aec0 0%, #718096 100%);
            border: 2px solid #cbd5e0;
            position: absolute;
            right: -150px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 5px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 1;
        }

        .piston-rod.extend {
            width: 180px;
        }

        .piston-rod.retract {
            width: 20px;
        }

        /* Piston Inside */
        .piston {
            position: absolute;
            width: 60px;
            height: 70px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            top: 50%;
            transform: translateY(-50%);
            transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #4a5568;
            z-index: 3;
        }

        .piston.extend {
            left: calc(100% - 70px);
        }

        .piston.retract {
            left: 5px;
        }

        /* Ports */
        .port {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            bottom: -50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            border: 3px solid;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .port.inactive {
            background: #2d3748;
            border-color: #4a5568;
            color: #718096;
            box-shadow: none;
        }

        .port.active {
            background: #48bb78;
            border-color: #38a169;
            color: #fff;
            box-shadow: 0 0 20px rgba(72, 187, 120, 0.6);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .port.a {
            left: 80px;
        }

        .port.b {
            right: 120px;
        }

        .port-label {
            position: absolute;
            bottom: -85px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
        }

        /* Air Flow Animation */
        .air-flow {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(72, 187, 120, 0.6);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        .air-flow.animate {
            animation: flowAnimation 0.8s linear infinite;
        }

        @keyframes flowAnimation {
            0% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(100px) scale(0.5);
            }
        }

        /* Control Buttons */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-extend {
            background: linear-gradient(135deg, #00c8ff 0%, #0099cc 100%);
            color: #fff;
        }

        .btn-extend.active {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
        }

        .btn-retract {
            background: linear-gradient(135deg, #ff6b35 0%, #cc5522 100%);
            color: #fff;
        }

        .btn-retract.active {
            background: linear-gradient(135deg, #ffaa00 0%, #cc8800 100%);
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.5);
        }

        .btn-auto {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-auto.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 0 25px rgba(245, 87, 108, 0.5);
            animation: pulse_btn 1s infinite;
        }

        @keyframes pulse_btn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Status Indicators */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .status-dot.inactive {
            background: #4a5568;
            box-shadow: none;
        }

        .status-dot.active {
            box-shadow: 0 0 10px currentColor;
            animation: blink 0.5s infinite;
        }

        .status-dot.port-a {
            background: #48bb78;
            color: #48bb78;
        }

        .status-dot.port-b {
            background: #ed8936;
            color: #ed8936;
        }

        .status-dot.status {
            background: #4299e1;
            color: #4299e1;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .info-box {
            background: rgba(255,255,255,0.1);
            border-left: 4px solid #00c8ff;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }

        .info-box strong {
            color: #00c8ff;
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .cylinder-container {
                padding: 20px;
                min-height: 250px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎮 จำลองการทำงาน (Interactive)</h2>
        <p class="subtitle">กดปุ่มด้านล่างเพื่อดูการเคลื่อนที่ของ Double-Acting Cylinder</p>

        <div class="cylinder-container">
            <div class="cylinder">
                <div class="end-cap left"></div>
                <div class="cylinder-body">
                    <div class="piston retract" id="piston"></div>
                </div>
                <div class="end-cap right"></div>
                <div class="piston-rod retract" id="rod"></div>
                
                <!-- Port A -->
                <div class="port a inactive" id="portA">
                    A
                    <span class="port-label">Port A</span>
                </div>
                
                <!-- Port B -->
                <div class="port b inactive" id="portB">
                    B
                    <span class="port-label">Port B</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-extend" id="btnExtend" onclick="extendCylinder()">
                <span>⬅️</span>
                <span>ยืดออก (Extend)</span>
            </button>
            <button class="btn btn-retract" id="btnRetract" onclick="retractCylinder()">
                <span>➡️</span>
                <span>หดเข้า (Retract)</span>
            </button>
            <button class="btn btn-auto" id="btnAuto" onclick="toggleAuto()">
                <span>🔁</span>
                <span>อัตโนมัติ</span>
            </button>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot port-a inactive" id="statusA"></div>
                <span>Port A</span>
            </div>
            <div class="status-item">
                <div class="status-dot port-b inactive" id="statusB"></div>
                <span>Port B</span>
            </div>
            <div class="status-item">
                <div class="status-dot status inactive" id="statusState"></div>
                <span>สถานะ</span>
            </div>
        </div>

        <div class="info-box" id="infoBox">
            <strong>💡 คำแนะนำ:</strong>
            กดปุ่ม "ยืดออก" หรือ "หดเข้า" เพื่อควบคุมกระบอกสูบ หรือเลือกโหมด "อัตโนมัติ" เพื่อดูการทำงานต่อเนื่อง
        </div>
    </div>

    <script>
        let isExtended = false;
        let autoMode = false;
        let autoInterval = null;

        function extendCylinder() {
            if (autoMode) toggleAuto(); // Turn off auto mode if on
            
            // Update UI
            document.getElementById('rod').className = 'piston-rod extend';
            document.getElementById('piston').className = 'piston extend';
            
            // Activate Port A (air entering from left)
            document.getElementById('portA').className = 'port a active';
            document.getElementById('portB').className = 'port b inactive';
            
            // Update status indicators
            document.getElementById('statusA').className = 'status-dot port-a active';
            document.getElementById('statusB').className = 'status-dot port-b inactive';
            document.getElementById('statusState').className = 'status-dot status active';
            
            // Update buttons
            document.getElementById('btnExtend').classList.add('active');
            document.getElementById('btnRetract').classList.remove('active');
            
            // Update info
            document.getElementById('infoBox').innerHTML = 
                '<strong>✅ สถานะ: ยืดออก (Extend)</strong>' +
                'ลมอัดเข้าทาง Port A ผลักลูกสูบไปทางขวา ทำให้ก้านสูบยืดออก ' +
                'ลมทางด้าน Port B ถูกปล่อยออกสู่บรรยากาศ';
            
            isExtended = true;
        }

        function retractCylinder() {
            if (autoMode) toggleAuto(); // Turn off auto mode if on
            
            // Update UI
            document.getElementById('rod').className = 'piston-rod retract';
            document.getElementById('piston').className = 'piston retract';
            
            // Activate Port B (air entering from right)
            document.getElementById('portB').className = 'port b active';
            document.getElementById('portA').className = 'port a inactive';
            
            // Update status indicators
            document.getElementById('statusB').className = 'status-dot port-b active';
            document.getElementById('statusA').className = 'status-dot port-a inactive';
            document.getElementById('statusState').className = 'status-dot status active';
            
            // Update buttons
            document.getElementById('btnRetract').classList.add('active');
            document.getElementById('btnExtend').classList.remove('active');
            
            // Update info
            document.getElementById('infoBox').innerHTML = 
                '<strong>✅ สถานะ: หดเข้า (Retract)</strong>' +
                'ลมอัดเข้าทาง Port B ผลักลูกสูบไปทางซ้าย ทำให้ก้านสูบหดเข้า ' +
                'ลมทางด้าน Port A ถูกปล่อยออกสู่บรรยากาศ';
            
            isExtended = false;
        }

        function toggleAuto() {
            autoMode = !autoMode;
            const btnAuto = document.getElementById('btnAuto');
            
            if (autoMode) {
                btnAuto.classList.add('active');
                document.getElementById('infoBox').innerHTML = 
                    '<strong>🔄 โหมดอัตโนมัติ: เปิดใช้งาน</strong>' +
                    'กระบอกสูบจะยืด-หด สลับกันทุก 2 วินาที';
                startAutoCycle();
            } else {
                btnAuto.classList.remove('active');
                document.getElementById('infoBox').innerHTML = 
                    '<strong>⏸️ โหมดอัตโนมัติ: ปิดใช้งาน</strong>' +
                    'กรุณาเลือกปุ่ม "ยืดออก" หรือ "หดเข้า" เพื่อควบคุมด้วยตนเอง';
                stopAutoCycle();
            }
        }

        function startAutoCycle() {
            // Start alternating between extend and retract
            autoInterval = setInterval(() => {
                if (isExtended) {
                    retractCylinder();
                } else {
                    extendCylinder();
                }
            }, 2000);
        }

        function stopAutoCycle() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
        }

        // Initialize
        retractCylinder();
        
        // Add click effects to ports
        document.getElementById('portA').addEventListener('click', () => {
            extendCylinder();
        });
        
        document.getElementById('portB').addEventListener('click', () => {
            retractCylinder();
        });
    </script>
</body>
</html>
