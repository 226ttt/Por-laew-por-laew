
 <!DOCTYPE html>
 <html lang="th">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Pneumatic Cylinder | รายงานกลุ่มที่ 7</title>
   <style>
     :root {
       --bg: #0b0f19; --bg-alt: #111827; --card: #161b2c;
       --border: #2a344a; --primary: #0ea5e9; --primary-glow: rgba(14, 165, 233, 0.25);
       --accent: #f59e0b; --text: #e2e8f0; --text-muted: #94a3b8;
       --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.4);
     }
     * { margin: 0; padding: 0; box-sizing: border-box; }
     html { scroll-behavior: smooth; }
     body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; overflow-x: hidden; }
     a { color: inherit; text-decoration: none; }
     ul, ol { padding-left: 1.2rem; } li { margin-bottom: 6px; }
 
     /* NAV */
     nav { position: sticky; top: 0; z-index: 100; background: rgba(11,15,25,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
     .brand { font-weight: 800; font-size: 1.15rem; color: var(--primary); }
     .nav-links { display: flex; gap: 18px; }
     .nav-links a { font-size: 0.9rem; color: var(--text-muted); transition: 0.3s; padding: 6px 10px; border-radius: 6px; }
     .nav-links a:hover { background: rgba(14,165,233,0.1); color: var(--primary); }
 
     /* HERO & TEAM */
     .hero { text-align: center; padding: 80px 20px 40px; background: radial-gradient(circle at 50% 0%, rgba(14,165,233,0.12), transparent 70%); }
     .hero h1 { font-size: 2.6rem; font-weight: 800; margin-bottom: 8px; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
     .hero .sub { color: var(--text-muted); font-size: 1.05rem; margin-bottom: 25px; }
     
     .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; max-width: 850px; margin: 0 auto 25px; }
     .team-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 12px; transition: 0.3s; position: relative; overflow: hidden; }
     .team-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: var(--shadow); }
     .team-card h3 { font-size: 0.95rem; margin: 10px 0 2px; }
     .student-id { font-size: 0.8rem; color: var(--accent); margin-bottom: 2px; font-family: monospace; }
     .role { font-size: 0.8rem; color: var(--text-muted); }
 
     /* PHOTO UPLOAD */
     .photo-wrap { position: relative; width: 75px; height: 75px; margin: 0 auto; cursor: pointer; }
     .photo-circle { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--border); overflow: hidden; background: var(--bg-alt); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
     .photo-wrap:hover .photo-circle { border-color: var(--primary); }
     .photo-img { width: 100%; height: 100%; object-fit: cover; }
     .photo-placeholder { width: 40px; height: 40px; fill: var(--text-muted); }
     .upload-hint { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.75); color: #fff; font-size: 0.65rem; text-align: center; padding: 3px 0; border-radius: 0 0 50% 50%; opacity: 0; transition: 0.2s; }
     .photo-wrap:hover .upload-hint { opacity: 1; }
 
     .meta { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
     .meta span { background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 6px; }
 
     /* MAIN */
     .container { max-width: 950px; margin: 0 auto; padding: 30px 20px 80px; }
     .section-title { font-size: 1.6rem; color: var(--primary); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
     .section-title::before { content: ''; width: 4px; height: 24px; background: var(--accent); border-radius: 2px; }
 
     /* ACCORDION */
     .acc-group { display: flex; flex-direction: column; gap: 12px; }
     .acc { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: 0.3s; }
     .acc:hover { border-color: rgba(14,165,233,0.4); }
     .acc-btn { width: 100%; padding: 16px 18px; background: transparent; border: none; color: var(--text); font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-align: left; transition: 0.2s; }
     .acc-btn:hover { background: rgba(255,255,255,0.03); }
     .acc-btn .arrow { transition: 0.3s; color: var(--primary); }
     .acc.open .acc-btn .arrow { transform: rotate(45deg); color: var(--accent); }
     .acc-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); padding: 0 18px; }
     .acc.open .acc-body { max-height: 1200px; padding: 0 18px 20px; }
     .acc-body h4 { color: var(--accent); margin: 15px 0 8px; }
     .acc-body p, .acc-body li { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 6px; }
     .acc-body strong { color: var(--text); }
 
     /* TABLES & CALC */
     .table-wrap { overflow-x: auto; margin: 15px 0; border: 1px solid var(--border); border-radius: 8px; }
     table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
     th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
     th { background: rgba(14,165,233,0.1); color: var(--primary); font-weight: 600; }
     tr:hover { background: rgba(255,255,255,0.02); }
 
     .calc-box { background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; margin: 25px 0; }
     .calc-inputs { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 12px 0; }
     .calc-inputs input { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: #0b0f19; color: #fff; width: 140px; text-align: center; }
     .btn { padding: 10px 18px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
     .btn:hover { background: #0284c7; box-shadow: 0 4px 12px var(--primary-glow); }
     .calc-result { font-size: 1.1rem; margin-top: 10px; color: var(--accent); font-weight: 600; }
 
     /* FOOTER & ANIM */
     footer { text-align: center; padding: 30px 20px; background: #070a11; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border); }
     footer a { color: var(--primary); }
     .fade-up { opacity: 0; transform: translateY(20px); transition: 0.6s; }
     .fade-up.visible { opacity: 1; transform: translateY(0); }
 
     @media (max-width: 768px) {
       .hero h1 { font-size: 2rem; } .nav-links { display: none; } .acc-btn { font-size: 0.95rem; } th, td { padding: 8px; font-size: 0.8rem; }
     }
   </style>
 </head>
